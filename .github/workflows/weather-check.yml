name: Daily Weather Check

on:
  schedule:
    # 매일 오후 8시 KST (= 11:00 UTC, GitHub Actions는 UTC 기준)
    - cron: "0 11 * * *"
  workflow_dispatch: # 수동 실행 버튼 활성화 (테스트용)

jobs:
  check-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weather check
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          OPENWEATHER_LAT: ${{ secrets.OPENWEATHER_LAT }}
          OPENWEATHER_LON: ${{ secrets.OPENWEATHER_LON }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          TWILIO_TO_NUMBER: ${{ secrets.TWILIO_TO_NUMBER }}
        run: python run.py
